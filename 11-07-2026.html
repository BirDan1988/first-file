let boxes=document.getElementsByClassName('box')
let turn= "X"
let gameOver=false;

let win = [
                [0,1,2],
                [3,4,5],
                [6,7,8],
                [0,3,6],
                [1,4,7],
                [2,5,8],
                [0,4,8],
                [2,4,6]
]



function winner(){
    win.forEach((value) => {
        let a = value[0];
        let b= value[1];
        let c= value[2];  
        if (boxes[a].innerText !== "" && boxes[a].innerText === boxes[b].innerText && boxes[b].innerText === boxes[c].innerText) {

            boxes[a].style.color='yellow'
            boxes[b].style.color='yellow'
            boxes[c].style.color='yellow'
            console.log("Winner is ",boxes[a].innerText)
            gameOver=true
            
        }     
    });
}

for (i=0;i<boxes.length;i++) {

           boxes[i].style.color='white'
           boxes[i].style.fontSize='100px'
           boxes[i].style.fontWeight='700'

boxes[i].onclick =function (){

    if(gameOver){
        return
    }

    if(this.innerText==="") {
        this.innerText=turn
        if (turn==='X') {
            turn='O';
        }
        else {
            turn='X';
        }
    }
     winner()
