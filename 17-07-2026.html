let users=[]
let editid=null

function sub(){

    let names=document.getElementById('name').value
    let age=document.getElementById('age').value
    let obj ={names,age}

 if(!names){
    document.getElementById('name-error').innerText='Enter Name is Mandotary'
 }

 if(!age){
     document.getElementById('age-error').innerText='Enter age is Mandotary'
 }


    if(names && age){

        if(editid!=null){
            users[editid]=obj
            editid=null
        }
        else {
        users.push(obj)
        }
    
    document.getElementById('name').value=''
    document.getElementById('age').value=''
    document.getElementById('name-error').innerText=''
    document.getElementById('age-error').innerText=''
    dataview()
    
    }
}

function dataview(){
    // console.log("*-*-*-*-*-*--------",users)
    
    let print=''
    users.map((i,index)=>{
          print+=`<tr>
            <td class="text-brown-500 text-md border-2 border-black px-3 py-1">${i.names}</td>
            <td class="text-brown-500 text-md border-2 border-black px-3 py-1">${i.age}</td>
            <td class="text-brown-500 text-md border-2 border-black px-3 py-1"><button onclick=update(${index}) class="font-medium px-2 text-blue-500">Update</button></td>
            <td class="text-brown-500 text-md border-2 border-black px-3 py-1"><button onclick=dlt(${index}) class="font-medium px-2 text-red-600">Delete</button></td>
        </tr>`
    })
    document.getElementById('showdata').innerHTML=print;
    // console.log("==================",users)
    
}


function dlt(index){
    console.log(index)
    users.splice(index,1)
    // console.log(users)
    dataview()
}


function update(index){
    editid=index
    let edit=users[index]
    document.getElementById('name').value=edit.names
    document.getElementById('age').value=edit.age
}
