<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css">
    <link rel="stylesheet" href="creative.css">
</head>
<body>



<script>

    let output=[]


    function sub(){





let product=document.getElementById('pro-name').value
let info=document.getElementById('info').value
let op=document.getElementById('op').value
let dp=document.getElementById('discount').value
let isource=document.getElementById('img').value

let obj={product,info,op,dp,isource}

if(!product){
    document.getElementById('product-error').innerText='Enter product Name'       
}

if(!info){
    document.getElementById('info-error').innerText='Enter Description'       
}

if(!op){
    document.getElementById('op-error').innerText='Enter Original Price'       
}

if(!dp){
    document.getElementById('dp-error').innerText='Enter Discount Price'       
}
if(!isource){
    document.getElementById('isource-error').innerText='Enter Image URL'       
}

if(product && info && op && dp && isource){
output.push(obj)
}


dataview()

}

function dataview(){

    let print="";
    output.map((i)=>{
        print += `<div class="main-part card border rounded-2xl shadow-lg overflow-hidden">
        <div class="image-part ">
                <img class="w-full h-60" src="${i.isource}">
            </div>
            <div class="content-part mt-3">
                <h3 class="heading text-xl text-black font-bold text-center mb-3 font-mono">${i.product}</h3>
                <p class="info text-gray-700 text-sm mb-3 text-center">${i.info}</p>
                <div class="pricing flex gap-4 justify-center mb-3">
                    <div class="price-card flex gap-2 items-center">
                        <p class="text-md text-gray-800 font-medium">Latest Price</p>
                        <div class="price-new text-2xl text-purple-800  font-bold font-mono">${i.dp}$</div>
                    </div>
                    <div class="price-card flex gap-2 items-center">
                        <p class="text-md text-gray-800 font-medium">Original Price</p>
                    <div class="price-org text-black text-2xl font-bold line-through font-mono">${i.op}$</div>
                  </div>
                </div>
                </div>
            </div>`

           document.getElementById('card').innerHTML=print

    })

}









</script>





    <div class="container mx-auto px-10 mt-10 flex justify-center mb-3">
        <div class="main ">
            <div class="div flex gap-3">
    <lable>Product Name:- </lable><input id="pro-name" class="border-2 mb-3" type="text" name="">
    <p id="product-error" class="text-red-600"></p>
   </div>
    <div class="flex items-start mb-3 gap-3">
    <lable >Description:- </lable><textarea id="info" class="border-2 ml-6" rows="5" type="text" name=""></textarea>
    <p id="info-error" class="text-red-600"></p>
    </div>
    <div class="div flex gap-3">
    <lable>Original Price:- </lable><input id="op" class="border-2 mb-3 ml-1" type="text" name="">
    <p id="op-error" class="text-red-600"></p>
</div>
<div class="div flex gap-3">
    <lable>Our Price:- </lable><input id="discount" class="border-2 mb-3 ml-8" type="text" name="">
    <p id="dp-error" class="text-red-600"></p>
</div>
<div class="div flex gap-3">
    <lable>Image Source:- </lable><input id="img" class="border-2 mb-3 ml-0.5" type="text" name="">
    <p id="isource-error" class="text-red-600"></p>
</div>
</div>
</div>


<div class="container mx-auto flex justify-center mb-2">
    <div class="btns">
        <button onclick="sub()" class="py-1 px-3 text-sm text-black rounded-md border">Submit</button>
    </div>
</div>

<div class="container mx-auto px-4 mt-5">
    <div class="">
        <div  id="card" class=" grid grid-cols-3 gap-5">
            <div class="main-part card border rounded-2xl shadow-lg overflow-hidden">
            <div class="image-part ">
                <img class="w-full h-60" src="https://hips.hearstapps.com/hmg-prod/images/dahlia-1508785047.jpg?crop=1.00xw:0.669xh;0,0.0136xh">
            </div>
            <div class="content-part mt-3 p-4">
                <h3 class="heading text-xl text-black font-bold text-center mb-3">123</h3>
                <p class="info text-gray-700 text-sm mb-3 text-justify"> there is a nice card created here as its nice look.</p>
                <div class="pricing flex gap-4 justify-center mb-3">
                    <div class="price-card flex gap-2 items-center">
                        <p class="text-md text-gray-800 font-medium">Latest Price</p>
                        <div class="price-new text-2xl text-purple-800  font-bold font-mono">100$</div>
                    </div>
                    <div class="price-card flex gap-2 items-center">
                        <p class="text-md text-gray-800 font-medium">Original Price</p>
                    <div class="price-org text-black text-2xl font-bold line-through font-mono">110$</div>
                  </div>
                  </div>
                </div>
            </div>
        </div>
    </div>
    </div>



    
</body>
</html>
