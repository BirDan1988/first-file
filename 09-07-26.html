<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="sample.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">
</head>
<body>

    <script>

function bg(){
    let i =document.getElementsByClassName('main')[0]
    let j=document.getElementsByClassName('details')[0]
    i.style.backgroundColor='black'
    i.style.setProperty("background-color", "black", "important")
    j.style.color='white'
}

function light(){
    let i =document.getElementsByClassName('main')[0]
    let j=document.getElementsByClassName('details')[0]
    i.style.backgroundColor='gray'
    i.style.setProperty("background-color", "gray", "important")
    j.style.color='black'
    
}

function hide() {
    let i =document.getElementsByClassName('main')[0]

    if(i.style.display === 'none'){
        i.style.display='flex'
        i.style.setProperty("display", "flex", "important")
    }

    else {
        i.style.display='none'
         i.style.setProperty("display", "none", "important")
    }

}

// function abc(){
//      let j =document.getElementsByClassName('details')[0]
//      j.style.fontSize ='50px'
//      j.style.setProperty("font-size", "20px", "important")
//      j.style.color='red'

// }

function kya(){
    let k =document.getElementsByTagName()
    k.style.fontSize='26px'
    k.style.setProperty("font-size", "26px", "important")
}


function change(){
    let i =document.getElementsByTagName('img')[0]
   
    if (i.src === "https://i0.wp.com/picjumbo.com/wp-content/uploads/silhouettes-of-a-beautiful-tropical-vacation-resort-free-image.jpg?w=600&quality=80") {
        i.src = "https://ik.imagekit.io/demo/img/beach_photo_wuC6hiv0Uy.jpeg?tr=w-600:l-image,i-logo-dark.png,lx-N10,ly-10,l-end:f-png"
    }

    else {
        i.src ="https://i0.wp.com/picjumbo.com/wp-content/uploads/silhouettes-of-a-beautiful-tropical-vacation-resort-free-image.jpg?w=600&quality=80"
    }
}






    </script>

<div class="main d-flex gap-5 mx-5 mt-3 bg-light border p-3 ">
    <div  class="details">
        <h3> Name :- Birju Danak</h3>
        <h3>Proffesion :- Web Designeer</h3>
      
         
    </div>
    <div class="image">
        <img class="w-100 h-100 d-block" src="https://ik.imagekit.io/demo/img/beach_photo_wuC6hiv0Uy.jpeg?tr=w-600:l-image,i-logo-dark.png,lx-N10,ly-10,l-end:f-png">
    </div>
</div>

  <button onclick="bg()" class="btn btn-dark">Dark Mode</button>
         <div onclick="light()" class="btn btn-primary">Light Mode</div>
         <div class="part-2 mt-2">
            <div onclick="hide()" class="btn btn-secondary">Profile show/ Hide</div>
         <div onclick="kya()" class="btn btn-warning">Change Font Size</div>
         <div onclick="change()" class="btn btn-secondary">Change photo</div>
         </div>
         



    
</body>
</html>
