<html lang="en">

    <meta charset="UTF-8">

<body>

<script>

function data() {
  let i = document.getElementById('title');
//   i.innerHTML = 'Thank you for click'
  i.style.color='blue'
  i.style.fontSize='60px'
  i.style.fontWeight='700'
  i.style.backgroundColor='yellow'

}

function reset() {
    let i = document.getElementById('title');
    i.style.color='black'
    i.style.fontSize='36px'
  i.style.fontWeight='600'
  i.style.backgroundColor='transparent'

}

function mode() {
    let i = document.getElementsByTagName('h1')[0];
    

    if(i.innerText === 'Light-Mode') {

        i.innerText='Dark-Mode'
       i.style.backgroundColor='black'
       i.style.color='white'
    }
     
        else  {

        i.innerText='Light-Mode'
       i.style.backgroundColor='pink'
       i.style.color='black'
    }
    }

    function display(){
        let i = document.getElementsByTagName('p')[0];

        if (i.style.display==='none') {
            i.style.display='block';
        } 
        else {
            i.style.display='none';
        }
    }

  let  a = 15
    function max() {
         
        let i = document.getElementsByTagName('h1')[0];
       
         a =a+5;
         
        
        i.style.fontSize= a + "px";

    }

    function image(){
        let i = document.getElementsByTagName('img')[0]

        if ( i.src==="https://thumbs.dreamstime.com/b/big-lion-lying-savannah-grass-landscape-characteristic-trees-plain-hills-background-35172905.jpg"){
        i.src="https://img.magnific.com/free-photo/african-lion-portrait-warm-light_475641-46.jpg?semt=ais_hybrid&w=740&q=80"

        }
         else {
            i.src="https://thumbs.dreamstime.com/b/big-lion-lying-savannah-grass-landscape-characteristic-trees-plain-hills-background-35172905.jpg"
         }
    }


    function info() {
        
        let i = document.getElementById('company')
        let p = document.getElementById('details')

        i.style.color='blue'
        i.style.fontSize='25px'
        p.style.color='gray'
        p.style.fontSize='18px'
        p.innerText='Our Company is no 1 in searching platform as it give most accurate and quick reply.'
        
    }

    function change(){
        let i = document.getElementById('theme')
        let p = document.getElementsByTagName('p')[0]
        let h = document.getElementsByTagName('h1')[0]


            // i.style.backgroundColor='white'
            // p.style.color='white'
            // h.style.color='yellow'
       
        if (i.style.backgroundColor==='black') {
            i.style.backgroundColor='white'
             p.style.color='black'
            h.style.color='black'
            
        }

        else {
            i.style.backgroundColor='black'
             p.style.color='white'
             h.style.color='yellow'
        }

    }

    function coltwist() {
        let i = document.getElementById('ppp')

        if (i.style.color==='red') {

           i.style.color='blue';
           }

           else {
              i.style.color='red'
           } 
    }

    let size = 16;
    function inc(){
        let i = document.getElementsByClassName('inc')[0]
        
        let a =4;
        size=size+a
        i.style.fontSize = size +"px";
    }
    
    function display() {
        let i = document.getElementsByTagName('h1')[0]

        if (i.style.display==='none'){
          i.style.display = 'block'
          }

          else {
            i.style.display='none'
          }
    }

    function thm() {
        let i = document.getElementById('1')
        let j = document.getElementById('2')

        if (i.style.backgroundColor==='black'){
            i.style.backgroundColor='white'
            i.style.color='black'
            j.innerText='Dark-mode'
            }

            else {
                i.style.backgroundColor='black';
                i.style.color='white'
                j.innerText='Light-mode'
            }
    }

    function grn(){
        let i = document.getElementsByTagName('p')

        for(let j=0;j<i.length;j++) {
            i[j].style.color='green'
        }    
    }

    function greet() {
        let i = document.getElementById('3')
        let j = document.getElementById('4')

        i.innerText = "Hello " + j.value + " !";
    
    }
    
    function age() {
        let i =document.getElementById(6)
        let j =document.getElementById(7)
      
        if(i.value >=18){
          j.innerText='You Can Vote'
        }

        else {
            j.innerText='You Cant Vote'
        }

    }

    let sum=0

function plus(){
    let x=document.getElementById('1')
    let i =document.getElementById('2')
    sum= sum+1
    x.innerText=sum;
}

function minus(){
    let x=document.getElementById('1')
    let i =document.getElementById('3')
    if (sum >0) {
        sum = sum-1
    x.innerText=sum;
     }
}

function reset(){
    let x=document.getElementById('1')
    let i =document.getElementById('4')
    sum= 0
    x.innerText=sum;
}


function add() {
    let i =document.getElementById('1')
     let j =document.getElementById('2')
     let k = document.getElementById('sum')
     total = Number(i.value) + Number(j.value);
     k.innerText=total  
}

function sub() {
    let i =document.getElementById('1')
     let j =document.getElementById('2')
     let k = document.getElementById('sum')
     total = Number(i.value) - Number(j.value);
     k.innerText=total  
}

function mul() {
    let i =document.getElementById('1')
     let j =document.getElementById('2')
     let k = document.getElementById('sum')
     total = Number(i.value) * Number(j.value);
     k.innerText=total  
}
function div() {
    let i =document.getElementById('1')
     let j =document.getElementById('2')
     let k = document.getElementById('sum')
     total = Number(i.value) / Number(j.value);
     k.innerText=total  
}






</script>
