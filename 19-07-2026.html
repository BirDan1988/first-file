<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css">
    <link rel="stylesheet" href="creative.css">
</head>
<body class="bg-black">

    <div class="container mx-auto px-3 mt-10 mb-15">
        <h1 class="text-[#E1EFF6] font-bold text-4xl text-center font-mono mb-3">Student Management System</h1>
        <p class="text-center text-gray-400 text-sm">Create • Update • Delete • Search Student Records</p>
    </div>

<div class="input-entry  border-2 border-gray-800 container mx-auto  mb-10  grid grid-cols-12 rounded-2xl items-center justify-center ">
    <div class=" left-part pt-10 pb-2  order-2 lg:order-1 col-span-12 lg:col-span-5 ">
        <div class="div">
    <div class="container mx-auto px-3 grid grid-cols-1 sm:grid-cols-[180px_250px] items-center mb-5">
            <lable class="text-white text-xl flex gap-2 items-center mb-3 sm:mb-0"><i class="fa-regular fa-user"></i>Student Name :-</lable><input id="s-name" class=" w-full max-w-80 border-2 border-gray-800 rounded-sm px-2 text-white py-2" type="text" placeholder="Enter Your Name">
            <p id="name-error" class="text-red-500 text-md "></p>
    </div>
    <div class="container mx-auto px-3 grid grid-cols-1 sm:grid-cols-[180px_250px] items-center mb-5">
            <lable class="text-white text-xl flex gap-2 items-center"><i class="fa-solid fa-book"></i>English :-</lable><input id="eng"  class=" w-full max-w-80 border-2 border-gray-800 rounded-sm px-2 text-white py-2" type="number" min="1" max="100" placeholder="Enter Your Marks">
            <p id="eng-error" class="text-red-500 text-md "></p>
    </div>
    <div class="container mx-auto px-3 grid grid-cols-1 sm:grid-cols-[180px_250px] items-center mb-5">
            <lable class="text-white text-xl flex gap-2 items-center"> <i class="fa-solid fa-calculator"></i>Maths :-</lable><input id="mat"  class=" w-full max-w-80 border-2 border-gray-800 rounded-sm px-2 text-white py-2" type="number" min="1" max="100" placeholder="Enter Your Marks">
            <p id="mat-error" class="text-red-500 text-md "></p>
    </div>
    <div class="container mx-auto px-3 grid grid-cols-1 sm:grid-cols-[180px_250px] items-center mb-5">
            <lable class="text-white text-xl flex gap-2 items-center"> <i class="fa-solid fa-atom"></i>Science :-</lable><input id="sci"  class=" w-full max-w-80 border-2 border-gray-800 rounded-sm px-2 text-white py-2" type="number" min="1" max="100" placeholder="Enter Your Marks">
            <p id="sci-error" class="text-red-500 text-md "></p>
    </div>
    <div class="container mx-auto px-3 grid grid-cols-1 sm:grid-cols-[180px_250px] items-center mb-5">
            <lable class="text-white text-xl flex gap-2 items-center"> <i class="fa-solid fa-computer"></i>Computer :-</lable><input id="cmp"  class=" w-full max-w-80 border-2 border-gray-800 rounded-sm px-2 text-white py-2" type="number" min="1" max="100" placeholder="Enter Your Marks">
            <p id="cmp-error" class="text-red-500 text-md "></p>
    </div>
    <div class="container mx-auto px-3 grid grid-cols-1 sm:grid-cols-[180px_250px] items-center mb-5">
            <lable class="text-white text-xl flex gap-2 items-center"> <i class="fa-regular fa-file-lines"></i>Gujarati :-</lable><input id="guj"  class=" w-full max-w-80 border-2 border-gray-800 rounded-sm px-2 text-white py-2" type="number" min="1" max="100" placeholder="Enter Your Marks">
            <p id="guj-error" class="text-red-500 text-md "></p>
    </div>
<div class="container mx-auto px-3  items-center flex gap-5 justify-center">
            <button onclick="submit()" class= "text-white font-medium px-4 py-1 text-xl rounded-md bg-gray-700 ">Submit</button><button onclick="demo()" class=" ml-1 text-white font-medium px-4 py-1 text-xl rounded-md bg-indigo-950 inline">Demo Data</button>
            
    </div>
    <div class="container mx-auto px-3 grid grid-cols-[180px_250px] items-center mt-5">
              <p>hello</p><p id="error" class="text-red-500 text-md "></p></div>
    </div>
    </div>
    <div class="image  overflow-hidden  order-1 lg:order-2 w-full h-full col-span-12  lg:col-span-7 p-3">
        <img class=" w-full h-full object-cover block rounded-xl" src="study.png">
    </div>

</div>


    

    <div class="container mx-auto px-3 mb-10">
        <h1 class="text-[#32DE8A] text-4xl font-bold text-center font-serif">Studnet's Information</h1>
    </div>

    <div class="container mx-auto px-3 mb-5 flex items-center justify-center">
        <input id="search" class="border border-gray-800 w-80 rounded-sm text-gray-200 px-3 py-1" type="text" placeholder="Enter Search Field"><button  onclick="fltr()" class="ml-5 px-4 py-1 bg-gray-700  text-md font-medium text-white rounded-md">search</button>
    </div>
    <div class="container mx-auto px-3 overflow-x-auto overflow-y-auto">
        <table class="min-w-full mx-auto">
            <thead>
                <tr>
                    <td class="text-yellow-600 text-xl font-medium bg-gray-800 text-center px-3 py-1 border-r-2 border-black">Student's name</td>
                    <td class="text-yellow-600 text-xl font-medium bg-gray-800 text-center px-3 py-1  border-r-2 border-black">English</td>
                    <td class="text-yellow-600 text-xl font-medium bg-gray-800 text-center px-3 py-1  border-r-2 border-black">Maths</td>
                    <td class="text-yellow-600 text-xl font-medium bg-gray-800 text-center px-3 py-1  border-r-2 border-black">Science</td>
                    <td class="text-yellow-600 text-xl font-medium bg-gray-800 text-center px-3 py-1  border-r-2 border-black">Computer</td>
                    <td class="text-yellow-600 text-xl font-medium bg-gray-800 text-center px-3 py-1  border-r-2 border-black">Gujarati</td>
                    <td class="text-yellow-600 text-xl font-medium bg-gray-800 text-center px-3 py-1  border-r-2 border-black">Total</td>
                    <td class="text-yellow-600 text-xl font-medium bg-gray-800 text-center px-3 py-1  border-r-2 border-black">%</td>
                    <td class="text-yellow-600 text-xl font-medium bg-gray-800 text-center px-3 py-1  border-r-2 border-black">Average</td>
                    <td class="text-yellow-600 text-xl font-medium bg-gray-800 text-center px-3 py-1  border-r-2 border-black">Grade</td>
                    <td class="text-yellow-600 text-xl font-medium bg-gray-800 text-center px-3 py-1  border-r-2 border-black">Result</td>
                    <td class="text-yellow-600 text-xl font-medium bg-gray-800 text-center px-3 py-1  border-r-2 border-black" colspan="2">Correction</td>
                </tr>
            </thead>
            <tbody id="tabledata">

                

            </tbody>
        </table>
    </div>

    <script src="script.js"></script>
</body>
</html>
