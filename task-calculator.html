           <div class="big-box bg-black h-110 mx-100 my-20 p-5 rounded-xl">
            <div id="screen" class="w-full h-20 bg-gray-200 rounded-md mb-5 text-4xl font-bold text-black flex items-center justify-end p-4"></div>
            <div class="row-1 grid grid-cols-5 gap-4 mb-4">

                 <div  class=" box h-15 bg-gray-200 rounded-md flex items-center justify-center text-4xl font-bold">8</div>
                 <div  class="box h-15 bg-gray-200 rounded-md flex items-center justify-center text-4xl font-bold">9</div>
                 <div  class="box h-15 bg-gray-200 rounded-md flex items-center justify-center text-4xl font-bold">/</div>
                 <div onclick="clr()"   class="box1 h-15 bg-gray-200 rounded-md flex items-center justify-center text-4xl font-bold">C</div>
        </div>
        <div class="row-1 grid grid-cols-5 gap-4 mb-4">
                 <div class="box h-15 bg-gray-200 rounded-md flex items-center justify-center text-4xl font-bold">4</div>
                 <div class="box h-15 bg-gray-200 rounded-md flex items-center justify-center text-4xl font-bold">5</div>
                 <div class="box h-15 bg-gray-200 rounded-md flex items-center justify-center text-4xl font-bold">6</div>
                 <div class="box h-15 bg-gray-200 rounded-md flex items-center justify-center text-4xl font-bold">*</div>
                 <div onclick="dlt()" class="box1 h-15 bg-gray-200 rounded-md flex items-center justify-center text-4xl font-bold block"><i class="fa-solid fa-right-long"></i></div>
        </div>
        <div class="row-1 grid grid-cols-5 gap-4 mb-4">
                 <div class="box h-15 bg-gray-200 rounded-md flex items-center justify-center text-4xl font-bold">1</div>
                 <div class="box h-15 bg-gray-200 rounded-md flex items-center justify-center text-4xl font-bold">2</div>
                 <div class="box h-15 bg-gray-200 rounded-md flex items-center justify-center text-4xl font-bold">3</div>
                 <div class="box h-15 bg-gray-200 rounded-md flex items-center justify-center text-4xl font-bold">+</div>
                 <div class="box h-15 bg-gray-200 rounded-md flex items-center justify-center text-4xl font-bold">-</div>
        </div>
        <div class="row-1 grid grid-cols-5 gap-4 mb-4">
                 <div class="box h-15 bg-gray-200 rounded-md flex items-center justify-center text-4xl font-bold">0</div>
                 <div class="box h-15 bg-gray-200 rounded-md flex items-center justify-center text-4xl font-bold">00</div>
                 <div onclick="execution()" class="box1 h-15 bg-gray-200 rounded-md flex items-center justify-center text-4xl font-bold">=</div>
                 <div class="box h-15 bg-gray-200 rounded-md flex items-center justify-center text-4xl font-bold">.</div>
                 <div class="box h-15 bg-gray-200 rounded-md flex items-center justify-center text-4xl font-bold"></div>
        </div>
            
            
           </div>
    </div>

    <script>



   let display=document.getElementById('screen')
   let boxes=document.getElementsByClassName('box')
   let first=""
   let operator=""



   function execution(){
    let x =eval(display.innerText)
    display.innerText =x;
   }

   function clr(){
    display.innerText="";
   }

function dlt(){
     display.innerText=  display.innerText.slice(0,-1)
}

   for (let box of boxes){
    box.onclick = function(){
    display.innerText += this.innerText
}

   }
