<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>sorting filter</title>
     <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css">
    <link rel="stylesheet" href="creative.css">
</head>
<body>

<div class="container mx-auto flex justify-center my-5">
<button  class="category p-2 text-sm border bg-gray-100 text-blue-800">All</button>
<button  class="category p-2 text-sm border bg-gray-100 text-blue-800">Animal</button>
<button  class="category p-2 text-sm border bg-gray-100 text-blue-800">flower</button>
<button  class="category p-2 text-sm border bg-gray-100 text-blue-800">Bird</button>
<button  class="category p-2 text-sm border bg-gray-100 text-blue-800">Country</button>

</div>

<div id="result" class="w-full text-2xl py-2 font-bold container mx-auto pl-20"></div>
              <script>
               arr = [{name:"lion",category:"Animal"},
                      {name:"Jesmin",category:"flower"},
                      {name:"Pigeon",category:"Bird"},
                      {name:"Norway",category:"Country"},
                      {name:"Tiger",category:"Animal"},
                      {name:"Sunflower",category:"flower"},
                      {name:"Peacock",category:"Bird"},
                      {name:"India",category:"Country"},
                      {name:"Elephant",category:"Animal"},
                      {name:"Hibiscus",category:"flower"},
                      {name:"Owl",category:"Bird"},
                      {name:"Australia",category:"Country"},
                      {name:"Zebra",category:"Animal"},
                      {name:"Rose",category:"flower"},
                      {name:"Sparrow",category:"Bird"},
                      {name:"Polland",category:"Country"},
                      {name:"Monkey",category:"Animal"},
                      {name:"Tulip",category:"flower"},
                      {name:"Eagle",category:"Bird"},
                      {name:"Itly",category:"Country"},
               ]


let buttons =document.getElementsByClassName('category')
let a =document.getElementById('result')


   for (i=0;i<buttons.length;i++){


    buttons[i].onclick = function() {
        let category = this.innerText;

        if(category==="All") {
         let full=  arr.map(v=>v.name)
        a.innerHTML = full.join("<br>")
        }
else {

    

    let newarr = arr.filter(v => v.category === category).map(v => v.name);


    a.innerHTML = newarr.join("<br>");

}
   }
        
    }

     // buttons[i].filter(v=>v.category='Animal').map(v=>v.name)

//     for (let i=0;i<buttons.length;i++) {
// }


    </script>





    
</body>
</html>
