<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>sorting filter</title>
     <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css">
    <link rel="stylesheet" href="creative.css">
</head>
<body>


    <div class="123 container mx-auto px-7 my-10 flex gap-4">
<button  class="category p-2 text-sm border bg-gray-100 text-blue-800 p-4 rounded-xl">All</button>
<button  class="category p-2 text-sm border bg-gray-100 text-blue-800 p-4 rounded-xl">Animal</button>
<button  class=" category p-2 text-sm border bg-gray-100 text-blue-800 p-4 rounded-xl">flower</button>
<button  class=" category p-2 text-sm border bg-gray-100 text-blue-800 p-4 rounded-xl">Bird</button>
<button  class=" category p-2 text-sm border bg-gray-100 text-blue-800 p-4 rounded-xl">Country</button>
</div>


<div id="333" class="w-full m-auto px-10 text-2xl text-black font-bold"> Names</div>
<div id="result" class="w-full m-auto px-10 text-xl text-brown-500">
</div>



    <script>
               arr = [{name:"lion",category:"Animal"},
                      {name:"Jesmin",category:"flower"},
                      {name:"Pigeon",category:"Bird"},
                      {name:"Norway",category:"Country"},
                      {name:"Tiger",category:"Animal"},
                      {name:"Sunflower",category:"flower"},
                      {name:"Peacock",category:"Bird"},
                      {name:"India",category:"Country"},
                      {name:"Elephant",category:"Animal"},
                      {name:"Hibiscus",category:"flower"},
                      {name:"Owl",category:"Bird"},
                      {name:"Australia",category:"Country"},
                      {name:"Zebra",category:"Animal"},
                      {name:"Rose",category:"flower"},
                      {name:"Sparrow",category:"Bird"},
                      {name:"Polland",category:"Country"},
                      {name:"Monkey",category:"Animal"},
                      {name:"Tulip",category:"flower"},
                      {name:"Eagle",category:"Bird"},
                      {name:"Itly",category:"Country"},
               ]


let buttons =document.getElementsByClassName('category')
let a =document.getElementById('result')
a.innerHTML=arr.map(v=>v.name).join("<br>")

for (let button of buttons) {
    button.onclick = function() {
        console.log(this.innerText)
        let newCategory= this.innerText
    
         if(newCategory==="All") {
              let newarr= arr.map(v=>v.name).join("<br>")
            a.innerHTML= newarr
    }
    else {
      let newarr= arr.filter(v=>v.category=== newCategory).map(v=>v.name).join("<br>")
     a.innerHTML= newarr
    }
  
    }

    }




     // buttons[i].filter(v=>v.category='Animal').map(v=>v.name)

//     for (let i=0;i<buttons.length;i++) {
// }


    </script>




    
</body>
</html>
